<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>La Gazzetta degli Eroi</title>
  <link rel="stylesheet" href="giornale.css" />
    <link rel="stylesheet" href="navbar.css" />
</head>

<body>
  <div class="gazzetta-page-shell">
    <section class="gazzetta-welcome" aria-label="Benvenuto">
      <div class="welcome-mark">♛</div>
      <div class="welcome-copy">
        <h1>Benvenuto nella Lega degli Eroi</h1>
        <p>Non è solo un fantacalcio. È una leggenda scritta ogni settimana.</p>
      </div>
      <div class="welcome-glow"></div>
    </section>

    <main class="gazette-frame" aria-label="La Gazzetta degli Eroi">
      <header class="gazette-masthead">
        <div class="edition-ribbon">Edizione Straordinaria</div>

        <div class="masthead-title-row">
          <div class="masthead-side-note">
            <span>Il giornale ufficiale</span>
            <strong>della Lega degli Eroi</strong>
          </div>

          <div class="brand-lockup">
            <h2>La Gazzetta degli Eroi</h2>
            <div class="brand-seal">⚜</div>
            <p>Dove i miti diventano storia</p>
          </div>

          <div class="issue-meta">
            <span class="issue-chip" id="chipDate">Data</span>
            <span class="issue-chip issue-chip-dark" id="chipGW">GW</span>
          </div>
        </div>

        <div class="gazette-toolbar">
          <div class="toolbar-left">
            <span class="toolbar-label">Edizione</span>
            <label for="gwSelect">Giornata</label>
            <select id="gwSelect" aria-label="Seleziona giornata"></select>
            <button id="btnReload" type="button">Aggiorna</button>
          </div>
          <div class="toolbar-right">
            <span id="status"></span>
          </div>
        </div>
      </header>

      <section id="output" class="gazette-paper">
        <div class="loading-card">Caricamento…</div>
      </section>
    </main>
  </div>
<script src="mobile-nav.js"></script>
    <script src="navbar.js"></script>
  <script type="module" src="giornale.js?v=20"></script>
</body>
</html>
