<!DOCTYPE html>
<html>
<head>
  <title>Draft</title>
</head>
<body>

<h2>Draft Room</h2>
<p id="userInfo">Caricamento utente...</p>
<p id="turnInfo">Caricamento turno...</p>

<input type="text" id="playerName" placeholder="Nome giocatore">
<button id="pickBtn" disabled>Fai Pick</button>

<p id="status"></p>

<script type="module">
import { supabase } from './supabase.js'

let currentUser = null
let currentProfile = null
let currentPickNumber = null

const loadDraft = async () => {
  const { data: { user } } = await supabase.auth.getUser()

  if (!user) {
    window.location.href = 'login.html'
    return
  }

  currentUser = user

  const { data: profile, error: profileError } = await supabase
    .from('profiles')
    .select('*')
    .eq('id', user.id)
    .single()

  if (profileError || !profile) {
    document.getElementById('userInfo').innerText = 'Profilo non trovato'
    console.error('Errore profilo:', profileError)
    return
  }

  currentProfile = profile

const { data: teamList, error: teamError } = await supabase
  .from('teams')
  .select('*')

console.log("TEAM LIST:", teamList)

const team = teamList?.find(t => t.id === profile.team_id)

  if (teamError || !team) {
    document.getElementById('userInfo').innerText = 'Squadra non trovata'
    console.error('Errore team:', teamError, 'team_id:', profile.team_id)
    return
  }

  document.getElementById('userInfo').innerText = 'Sei: ' + team.name

  const { data: state, error: stateError } = await supabase
    .from('draft_state')
    .select('*')
    .eq('id', 1)
    .single()

  if (stateError || !state) {
    document.getElementById('turnInfo').innerText = 'Stato draft non trovato'
    console.error('Errore stato:', stateError)
    return
  }

  currentPickNumber = state.current_pick

  const { data: currentTurn, error: turnError } = await supabase
    .from('draft_order')
    .select('*')
    .eq('pick_number', currentPickNumber)
    .single()

  if (turnError || !currentTurn) {
    document.getElementById('turnInfo').innerText = 'Turno corrente non trovato'
    console.error('Errore turno:', turnError)
    return
  }

  const { data: turnTeam, error: turnTeamError } = await supabase
    .from('teams')
    .select('id, name')
    .eq('id', currentTurn.team_id)
    .single()

  if (turnTeamError || !turnTeam) {
    document.getElementById('turnInfo').innerText = 'Squadra del turno non trovata'
    console.error('Errore team turno:', turnTeamError)
    return
  }

  document.getElementById('turnInfo').innerText =
    'Pick corrente: #' + currentPickNumber + ' - Tocca a: ' + turnTeam.name

  const isMyTurn = currentTurn.team_id === currentProfile.team_id

  if (isMyTurn) {
    document.getElementById('status').innerText = 'È il tuo turno'
    document.getElementById('pickBtn').disabled = false
  } else {
    document.getElementById('status').innerText = 'Non è il tuo turno'
    document.getElementById('pickBtn').disabled = true
  }
}

document.getElementById('pickBtn').addEventListener('click', async () => {
  const playerName = document.getElementById('playerName').value.trim()

  if (!playerName) {
    document.getElementById('status').innerText = 'Inserisci un giocatore'
    return
  }

  const { data: currentTurn } = await supabase
    .from('draft_order')
    .select('*')
    .eq('pick_number', currentPickNumber)
    .single()

  if (!currentTurn || currentTurn.team_id !== currentProfile.team_id) {
    document.getElementById('status').innerText = 'Non puoi chiamare ora'
    return
  }

  const { error: insertError } = await supabase
    .from('draft_picks')
    .insert([{
      pick_number: currentPickNumber,
      team_id: currentProfile.team_id,
      player_name: playerName,
      user_id: currentUser.id
    }])

  if (insertError) {
    document.getElementById('status').innerText = 'Errore salvataggio pick'
    console.error('Errore insert:', insertError)
    return
  }

  const { error: updateError } = await supabase
    .from('draft_state')
    .update({ current_pick: currentPickNumber + 1 })
    .eq('id', 1)

  if (updateError) {
    document.getElementById('status').innerText = 'Pick salvata ma errore aggiornamento turno'
    console.error('Errore update stato:', updateError)
    return
  }

  document.getElementById('status').innerText = 'Pick salvata!'
  document.getElementById('playerName').value = ''

  loadDraft()
})

loadDraft()
</script>

</body>
</html>
