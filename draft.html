<!DOCTYPE html>
<html>
<head>
  <title>Draft</title>
</head>
<body>

<h2>Draft Room</h2>
<p id="userInfo">Caricamento...</p>

<script type="module">
import { supabase } from './supabase.js'

const loadUser = async () => {
  const { data: { user } } = await supabase.auth.getUser()

  if (!user) {
    window.location.href = 'login.html'
    return
  }

  const { data: profile } = await supabase
    .from('profiles')
    .select('*, teams(name)')
    .eq('id', user.id)
    .single()

  document.getElementById('userInfo').innerText =
    "Sei: " + profile.teams.name
}

loadUser()
</script>

</body>
</html>
